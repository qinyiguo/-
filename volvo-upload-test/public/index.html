<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volvo 上傳測試</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Microsoft JhengHei', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 32px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 24px; }
  .card { background: #1e293b; border: 1px solid #2d3f56; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .upload-zone { border: 2px dashed #2d3f56; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover, .upload-zone.drag { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
  .upload-zone .icon { font-size: 40px; margin-bottom: 8px; }
  .upload-zone p { color: #64748b; font-size: 13px; margin-top: 4px; }
  input[type=file] { display: none; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #2d3f56; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .file-list { margin-top: 12px; }
  .file-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1e293b; font-size: 13px; }
  .result-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #2d3f56; font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(16,185,129,.15); color: #10b981; }
  .badge-red { background: rgba(239,68,68,.15); color: #ef4444; }
  .badge-blue { background: rgba(59,130,246,.15); color: #3b82f6; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #0f172a; color: #64748b; font-size: 12px; text-align: left; padding: 8px 12px; border-bottom: 1px solid #2d3f56; }
  td { padding: 8px 12px; border-bottom: 1px solid rgba(45,63,86,.4); }
  tr:hover td { background: rgba(37,51,71,.5); }
  .num { text-align: right; }
  .hint { background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #94a3b8; line-height: 1.8; }
  .hint code { background: #0f172a; padding: 1px 5px; border-radius: 3px; color: #60a5fa; }
  .counts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .count-card { background: #0f172a; border: 1px solid #2d3f56; border-radius: 8px; padding: 14px; text-align: center; }
  .count-val { font-size: 28px; font-weight: 800; color: #fff; }
  .count-label { font-size: 11px; color: #64748b; margin-top: 2px; }
  #btn-refresh { margin-left: auto; }
</style>
</head>
<body>
<h1>📤 Volvo Excel 上傳測試</h1>
<p class="sub">確認四種 DMS Excel 是否能正確寫入 PostgreSQL</p>

<!-- 檔名提示 -->
<div class="hint" style="margin-bottom:16px">
  ⚠️ <strong>檔名需包含據點和期間</strong>，系統才能自動辨識，例如：<br>
  <code>維修收入分類明細_AMA_202501.xlsx</code>　
  <code>技師績效報表_AMC_202501.xlsx</code>　
  <code>零件銷售明細_AMD_202501.xlsx</code>　
  <code>業務查詢_AMA_202501.xlsx</code>
</div>

<!-- 上傳區 -->
<div class="card">
  <div class="card-title">📁 選擇 Excel 檔案</div>
  <div class="upload-zone" id="zone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📊</div>
    <strong>拖拉檔案到這裡，或點擊選擇</strong>
    <p>支援 .xlsx / .xls，最多 8 個</p>
  </div>
  <input type="file" id="fileInput" multiple accept=".xlsx,.xls">
  <div class="file-list" id="fileList"></div>
  <div style="margin-top:14px;display:flex;gap:8px;align-items:center">
    <button class="btn btn-primary" id="btnUpload" disabled onclick="doUpload()">上傳</button>
    <span id="uploadStatus" style="font-size:13px;color:#64748b"></span>
  </div>
</div>

<!-- 上傳結果 -->
<div class="card" id="resultsCard" style="display:none">
  <div class="card-title">📋 上傳結果</div>
  <div id="results"></div>
</div>

<!-- 資料庫筆數 -->
<div class="card">
  <div style="display:flex;align-items:center;margin-bottom:12px">
    <div class="card-title" style="margin:0">🗄️ 各表格筆數</div>
    <button class="btn btn-secondary" id="btn-refresh" onclick="loadCounts()" style="padding:5px 12px;font-size:12px">重新整理</button>
  </div>
  <div class="counts-grid" id="counts">
    <div style="color:#64748b;font-size:13px">載入中...</div>
  </div>
</div>

<!-- 上傳歷史 -->
<div class="card">
  <div class="card-title">📜 上傳歷史</div>
  <div style="overflow-x:auto">
    <table id="historyTable">
      <thead>
        <tr><th>時間</th><th>檔案</th><th>類型</th><th>據點</th><th>期間</th><th class="num">筆數</th><th>狀態</th></tr>
      </thead>
      <tbody id="historyBody"><tr><td colspan="7" style="color:#64748b;padding:16px">載入中...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
let selectedFiles = [];

// 拖拉
const zone = document.getElementById('zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  selectedFiles = Array.from(files).filter(f => f.name.match(/\.xlsx?$/i));
  const list = document.getElementById('fileList');
  if (!selectedFiles.length) { list.innerHTML = ''; return; }
  list.innerHTML = selectedFiles.map(f => `
    <div class="file-item">
      <span>📄 ${f.name}</span>
      <span style="color:#64748b">${(f.size/1024).toFixed(0)} KB</span>
    </div>
  `).join('');
  document.getElementById('btnUpload').disabled = false;
}

async function doUpload() {
  if (!selectedFiles.length) return;
  const btn = document.getElementById('btnUpload');
  const status = document.getElementById('uploadStatus');
  btn.disabled = true;
  status.textContent = '上傳中...';

  const formData = new FormData();
  selectedFiles.forEach(f => formData.append('files', f));

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    showResults(data.results);
    selectedFiles = [];
    document.getElementById('fileList').innerHTML = '';
    loadCounts();
    loadHistory();
  } catch (err) {
    status.textContent = '上傳失敗: ' + err.message;
  } finally {
    btn.disabled = false;
    status.textContent = '';
  }
}

function showResults(results) {
  const card = document.getElementById('resultsCard');
  const div = document.getElementById('results');
  card.style.display = '';
  div.innerHTML = results.map(r => `
    <div class="result-item">
      <span style="font-weight:600">${r.filename}</span>
      <div style="display:flex;gap:8px;align-items:center">
        ${r.status === 'success'
          ? `<span class="badge badge-green">成功</span>
             <span style="color:#64748b;font-size:12px">${r.fileType} / ${r.branch || '-'} / ${r.period || '-'} / ${r.rowCount}筆</span>`
          : `<span class="badge badge-red">失敗</span>
             <span style="color:#ef4444;font-size:12px">${r.error}</span>`
        }
      </div>
    </div>
  `).join('');
}

async function loadCounts() {
  try {
    const res = await fetch('/api/counts');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('counts').innerHTML = data.map(r => `
      <div class="count-card">
        <div class="count-val">${parseInt(r['筆數']).toLocaleString()}</div>
        <div class="count-label">${r['表格']}</div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('counts').innerHTML = `<span style="color:#ef4444;font-size:13px">❌ ${err.message}</span>`;
  }
}

async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    const data = await res.json();
    const tbody = document.getElementById('historyBody');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="7" style="color:#64748b;padding:16px">尚無紀錄</td></tr>'; return; }
    tbody.innerHTML = data.map(h => `
      <tr>
        <td style="font-size:12px;color:#64748b">${new Date(h.created_at).toLocaleString('zh-TW')}</td>
        <td style="font-size:12px">${h.file_name}</td>
        <td><span class="badge badge-blue">${h.file_type || '-'}</span></td>
        <td>${h.branch || '-'}</td>
        <td>${h.period || '-'}</td>
        <td class="num">${h.row_count?.toLocaleString() || 0}</td>
        <td><span class="badge ${h.status === 'success' ? 'badge-green' : 'badge-red'}">${h.status === 'success' ? '成功' : '失敗'}</span></td>
      </tr>
    `).join('');
  } catch (err) {
    document.getElementById('historyBody').innerHTML = `<tr><td colspan="7" style="color:#ef4444">${err.message}</td></tr>`;
  }
}

// 初始載入
loadCounts();
loadHistory();
</script>
</body>
</html>
